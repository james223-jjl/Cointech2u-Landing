<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voronoi Panels — Tech Minimal</title>
    <style>
        html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { Delaunay } from "https://esm.sh/d3-delaunay@6.0.4";

        // ── Tuning ─────────────────────────────────────────────────────
        const NUM_POINTS       = 5;     // panel count (matches Glass Hero "Piece Count")
        const RELAX_ITERATIONS = 4;     // Lloyd's relaxation passes for cleaner cells
        const MOUSE_RADIUS     = 320;   // px — distance at which cursor influences seeds
        const MOUSE_FORCE      = 90;    // px — peak displacement of nearest seed
        const SPRING_K         = 0.07;  // stiffness toward target position
        const SPRING_DAMP      = 0.82;  // velocity damping
        const DRIFT_AMP        = 18;    // px — idle wander amplitude
        const PANEL_FILL       = '#111';
        const PANEL_GRAD_HOT   = 'rgba(28, 28, 32, 1)';   // panel center
        const PANEL_GRAD_COLD  = 'rgba(7,  7,  9,  1)';    // panel rim
        const EDGE_INNER_GLOW  = 'rgba(255, 255, 255, 0.04)'; // wide inner soft rim
        const EDGE_INNER_HI    = 'rgba(255, 255, 255, 0.13)'; // tighter highlight just inside edge
        const EDGE_OUTLINE     = 'rgba(255, 255, 255, 0.20)'; // crisp boundary line
        // ───────────────────────────────────────────────────────────────

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        let width, height;
        const seeds = [];     // { baseX, baseY, phase } — anchor + idle phase
        const live  = [];     // { x, y } — current rendered position
        const vel   = [];     // { x, y } — spring velocity
        const mouse = { x: -1e6, y: -1e6 };  // smoothed
        const aim   = { x: -1e6, y: -1e6 };  // raw cursor

        function init() {
            width  = window.innerWidth;
            height = window.innerHeight;
            canvas.width  = width  * dpr;
            canvas.height = height * dpr;
            canvas.style.width  = width  + 'px';
            canvas.style.height = height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            seeds.length = 0;
            live.length  = 0;
            vel.length   = 0;

            // Distribute initial seeds in a loose ring + jitter
            for (let i = 0; i < NUM_POINTS; i++) {
                const angle = (i / NUM_POINTS) * Math.PI * 2 + Math.random() * 0.5;
                const r = Math.min(width, height) * 0.30 * (0.55 + Math.random() * 0.5);
                const x = width  / 2 + Math.cos(angle) * r + (Math.random() - 0.5) * 120;
                const y = height / 2 + Math.sin(angle) * r + (Math.random() - 0.5) * 120;
                seeds.push({ baseX: x, baseY: y, phase: Math.random() * Math.PI * 2 });
                live.push({ x, y });
                vel.push({ x: 0, y: 0 });
            }

            // Lloyd's relaxation — moves each seed to its cell centroid,
            // produces the evenly-distributed Glass-Hero-style cells
            for (let n = 0; n < RELAX_ITERATIONS; n++) lloydStep();
        }

        function lloydStep() {
            const d = Delaunay.from(seeds.map(p => [p.baseX, p.baseY]));
            const v = d.voronoi([0, 0, width, height]);
            for (let i = 0; i < seeds.length; i++) {
                const poly = v.cellPolygon(i);
                if (!poly) continue;
                let cx = 0, cy = 0;
                const n = poly.length - 1; // last point repeats first
                for (let j = 0; j < n; j++) { cx += poly[j][0]; cy += poly[j][1]; }
                seeds[i].baseX = cx / n;
                seeds[i].baseY = cy / n;
                live[i].x = seeds[i].baseX;
                live[i].y = seeds[i].baseY;
            }
        }

        let t = 0;
        function frame() {
            t += 0.016;

            // Smooth cursor
            mouse.x += (aim.x - mouse.x) * 0.14;
            mouse.y += (aim.y - mouse.y) * 0.14;

            // Update each seed: idle drift + mouse repulsion → spring
            for (let i = 0; i < seeds.length; i++) {
                const s = seeds[i];

                const driftX = Math.sin(t * 0.30 + s.phase)        * DRIFT_AMP
                             + Math.cos(t * 0.45 + s.phase * 1.3)  * (DRIFT_AMP * 0.55);
                const driftY = Math.cos(t * 0.35 + s.phase)        * DRIFT_AMP
                             + Math.sin(t * 0.50 + s.phase * 0.7)  * (DRIFT_AMP * 0.55);

                let targetX = s.baseX + driftX;
                let targetY = s.baseY + driftY;

                // Mouse repulsion (cubic falloff, sharper near cursor)
                const dx = live[i].x - mouse.x;
                const dy = live[i].y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < MOUSE_RADIUS) {
                    const f = 1 - dist / MOUSE_RADIUS;
                    const force = f * f * f * MOUSE_FORCE;
                    targetX += (dx / (dist || 1)) * force;
                    targetY += (dy / (dist || 1)) * force;
                }

                vel[i].x = vel[i].x * SPRING_DAMP + (targetX - live[i].x) * SPRING_K;
                vel[i].y = vel[i].y * SPRING_DAMP + (targetY - live[i].y) * SPRING_K;
                live[i].x += vel[i].x;
                live[i].y += vel[i].y;
            }

            render();
            requestAnimationFrame(frame);
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            const d = Delaunay.from(live.map(p => [p.x, p.y]));
            const v = d.voronoi([0, 0, width, height]);

            // PASS 1 — fill each cell with radial gradient (depth/chamfer fake)
            for (let i = 0; i < live.length; i++) {
                const poly = v.cellPolygon(i);
                if (!poly) continue;

                ctx.save();
                tracePoly(poly);
                ctx.fillStyle = PANEL_FILL;
                ctx.fill();

                tracePoly(poly);
                ctx.clip();
                const cx = live[i].x;
                const cy = live[i].y;
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 580);
                grad.addColorStop(0,    PANEL_GRAD_HOT);
                grad.addColorStop(0.7,  '#0E0E10');
                grad.addColorStop(1,    PANEL_GRAD_COLD);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }

            // PASS 2 — clipped wide strokes (inner-edge chamfer rim)
            for (let i = 0; i < live.length; i++) {
                const poly = v.cellPolygon(i);
                if (!poly) continue;

                ctx.save();
                tracePoly(poly);
                ctx.clip();

                tracePoly(poly);
                ctx.lineWidth = 18;
                ctx.strokeStyle = EDGE_INNER_GLOW;
                ctx.stroke();

                tracePoly(poly);
                ctx.lineWidth = 4;
                ctx.strokeStyle = EDGE_INNER_HI;
                ctx.stroke();

                ctx.restore();
            }

            // PASS 3 — crisp outline at the actual cell boundary
            for (let i = 0; i < live.length; i++) {
                const poly = v.cellPolygon(i);
                if (!poly) continue;
                tracePoly(poly);
                ctx.lineWidth = 1;
                ctx.strokeStyle = EDGE_OUTLINE;
                ctx.stroke();
            }
        }

        function tracePoly(poly) {
            ctx.beginPath();
            ctx.moveTo(poly[0][0], poly[0][1]);
            for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
            ctx.closePath();
        }

        // Cursor tracking
        canvas.addEventListener('pointermove', (e) => {
            aim.x = e.clientX;
            aim.y = e.clientY;
        });
        canvas.addEventListener('pointerleave', () => {
            aim.x = -1e6;
            aim.y = -1e6;
        });

        // Resize → reinit (Voronoi extents change)
        let resizeRaf = 0;
        window.addEventListener('resize', () => {
            cancelAnimationFrame(resizeRaf);
            resizeRaf = requestAnimationFrame(init);
        });

        init();
        frame();
    </script>
</body>
</html>
